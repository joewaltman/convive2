[build]
builder = "nixpacks"

[[crons]]
schedule = "0 17 * * *"
command = "node dist/send-reminders.js && node dist/send-post-dinner.js"

[[crons]]
schedule = "*/15 * * * *"
command = "node dist/process-waitlist.js && node dist/expire-pending-reservations.js"

[[crons]]
schedule = "*/15 * * * *"
command = "node dist/lunchclub/below-floor.js"

[[crons]]
schedule = "0 * * * *"
command = "node dist/lunchclub/nudge.js"

[[crons]]
schedule = "0 17 * * *"
command = "node dist/lunchclub/day-before.js && node dist/lunchclub/monthly.js"
